<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAgenda | Citas Médicas</title>
    <link rel="stylesheet" href="css/styles.css">
    <!-- FontAwesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- PANTALLA INICIO: SELECCIÓN DE ROLES -->
    <section id="view-roles" class="view active">
        <div class="container text-center">
            <h1 class="logo-title">MediAgenda</h1>
            <p class="subtitle">Seleccione su portal de acceso</p>
            <div class="role-cards">
                <button class="card-btn glossy" onclick="app.showView('view-patient-auth')">
                    <i class="fa-solid fa-user-injured fa-3x"></i>
                    <h2>Paciente</h2>
                </button>
                <button class="card-btn glossy" onclick="app.showView('view-doctor-auth')">
                    <i class="fa-solid fa-user-doctor fa-3x"></i>
                    <h2>Médico</h2>
                </button>
                <button class="card-btn glossy admin-btn" onclick="app.showView('view-admin-auth')">
                    <i class="fa-solid fa-user-shield fa-3x"></i>
                    <h2>Administrador</h2>
                </button>
            </div>
        </div>
    </section>

    <!-- PANTALLA PACIENTE: LOGIN / REGISTRO -->
    <section id="view-patient-auth" class="view">
        <div class="container auth-container">
            <button class="back-btn" onclick="app.showView('view-roles')"><i class="fa-solid fa-arrow-left"></i> Volver</button>
            <div class="auth-box">
                <h2>Portal Paciente</h2>
                
                <!-- Login -->
                <form id="form-patient-login" class="active">
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="pat-login-email" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <div class="pwd-wrapper">
                            <input type="password" id="pat-login-pwd" required>
                            <i class="fa-solid fa-eye toggle-pwd" onclick="app.togglePassword('pat-login-pwd', this)"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-main glossy">Iniciar Sesión</button>
                    <p class="switch-form" onclick="app.toggleAuthForm('patient')">¿No tienes cuenta? Regístrate aquí</p>
                </form>

                <!-- Registro -->
                <form id="form-patient-register" style="display:none;">
                    <div class="input-group">
                        <label>Cédula de Identidad (CI)</label>
                        <input type="text" id="pat-reg-ci" required>
                    </div>
                    <div class="input-group">
                        <label>Nombres Completos</label>
                        <input type="text" id="pat-reg-name" required>
                    </div>
                    <div class="input-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="pat-reg-email" required>
                    </div>
                    <div class="input-group">
                        <label>Celular</label>
                        <input type="tel" id="pat-reg-phone" required>
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <div class="pwd-wrapper">
                            <input type="password" id="pat-reg-pwd" required>
                            <i class="fa-solid fa-eye toggle-pwd" onclick="app.togglePassword('pat-reg-pwd', this)"></i>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Confirmar Contraseña</label>
                        <input type="password" id="pat-reg-pwd-conf" required>
                    </div>
                    <button type="submit" class="btn-main glossy">Registrarse</button>
                    <p class="switch-form" onclick="app.toggleAuthForm('patient')">¿Ya tienes cuenta? Inicia Sesión</p>
                </form>
            </div>
        </div>
    </section>

    <!-- DASHBOARD PACIENTE -->
    <section id="view-patient-dashboard" class="view">
        <div class="dashboard-header">
            <h2>Bienvenido, <span id="patient-name-display">Paciente</span></h2>
            <button class="btn-danger glossy" onclick="app.showView('view-roles')">Cerrar Sesión</button>
        </div>
        <div class="container dashboard-grid">
            <div class="panel">
                <h3>Agendar Nueva Cita</h3>
                <form id="form-book-appointment">
                    <div class="input-group">
                        <label>Especialidad</label>
                        <select id="appt-specialty" onchange="app.filterDoctors()" required>
                            <option value="">Seleccione...</option>
                            <option value="psicologia">Psicología</option>
                            <option value="odontologia">Odontología</option>
                            <option value="general">Medicina General</option>
                            <option value="pediatria">Pediatría</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Médico</label>
                        <select id="appt-doctor" required disabled><option>Seleccione especialidad primero</option></select>
                    </div>
                    <div class="input-group">
                        <label>Fecha y Hora</label>
                        <input type="datetime-local" id="appt-date" required>
                    </div>
                    <div class="input-group">
                        <label>Motivo de Consulta</label>
                        <textarea id="appt-reason" rows="3" required></textarea>
                    </div>
                    <button type="submit" class="btn-main glossy">Agendar Cita</button>
                </form>
            </div>
            <div class="panel">
                <h3>Mis Citas</h3>
                <div id="patient-appointments-list" class="appointment-list">
                    <div class="appt-card pending">
                        <h4>Dr. Ficticio (Odontología)</h4>
                        <p><strong>Fecha:</strong> 25/10/2026 - 10:00 AM</p>
                        <p><strong>Estado:</strong> <span class="badge">Pendiente</span></p>
                        <div class="actions">
                            <button class="btn-small glossy" onclick="app.promptReason('reprogramar')">Reprogramar</button>
                            <button class="btn-small btn-danger glossy" onclick="app.promptReason('cancelar')">Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Firebase App -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
