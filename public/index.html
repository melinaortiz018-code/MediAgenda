<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAgenda - Sistema de Citas Médicas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>

    <!-- VISTA INICIO -->
    <div id="vistaInicio" class="vista pantalla-inicio">
        <div class="contenedor-inicio">
            <h1 class="titulo-principal">🏥 MediAgenda</h1>
            <p class="subtitulo">Sistema de Gestión de Citas Médicas</p>
            <h2 class="seleccion-rol">Selecciona tu tipo de cuenta</h2>

            <!-- TARJETAS DE ROLES -->
            <div class="roles-grid">
                <div class="rol-card" onclick="seleccionarRol('paciente', this)">
                    <div class="icono-rol">👤</div>
                    <h3>Paciente</h3>
                </div>
                <div class="rol-card" onclick="seleccionarRol('medico', this)">
                    <div class="icono-rol">🩺</div>
                    <h3>Médico</h3>
                </div>
                <div class="rol-card" onclick="seleccionarRol('admin', this)">
                    <div class="icono-rol">🛡️</div>
                    <h3>Administrador</h3>
                </div>
            </div>

            <!-- FORMULARIO -->
            <input type="hidden" id="loginRol">

            <div id="tabsAuth" class="tabs-auth">
                <button class="tab-btn active" onclick="cambiarTab('login')">Iniciar Sesión</button>
                <button class="tab-btn" onclick="cambiarTab('registro')">Registrarse</button>
            </div>

            <div id="camposLogin" class="campos-login">
                <div id="grupoLoginCI" class="grupo-campo">
                    <label for="loginCI">Cédula de Identidad (CI)</label>
                    <input type="text" id="loginCI" placeholder="Ingresa tu cédula">
                </div>

                <div id="grupoLoginCorreo" class="grupo-campo">
                    <label for="loginCorreo">Correo Electrónico</label>
                    <input type="email" id="loginCorreo" placeholder="tu@correo.com">
                </div>

                <div class="grupo-campo">
                    <label for="loginPassword">Contraseña</label>
                    <div class="input-con-boton">
                        <input type="password" id="loginPassword" placeholder="Ingresa tu contraseña">
                        <button type="button" onclick="togglePassword('loginPassword', this)">👁️</button>
                    </div>
                </div>

                <p id="loginHint" class="hint"></p>
                <button type="button" class="btn-principal" onclick="iniciarSesion()">Ingresar</button>
            </div>

            <!-- FORMULARIO REGISTRO -->
            <div id="formRegistro" class="formulario" style="display: none;">
                <h3>Crear Cuenta de Paciente</h3>
                <form onsubmit="registrarUsuario(event)">
                    <div class="grupo-campo">
                        <label for="regCi">Cédula *</label>
                        <input type="text" id="regCi" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="regNombres">Nombres Completos *</label>
                        <input type="text" id="regNombres" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="regCorreo">Correo *</label>
                        <input type="email" id="regCorreo" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="regCelular">Celular *</label>
                        <input type="tel" id="regCelular" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="regDireccion">Dirección</label>
                        <input type="text" id="regDireccion">
                    </div>
                    <div class="grupo-campo">
                        <label for="regPassword">Contraseña *</label>
                        <input type="password" id="regPassword" required>
                    </div>
                    <div class="grupo-campo">
                        <label for="regConfirmPassword">Confirmar Contraseña *</label>
                        <input type="password" id="regConfirmPassword" required>
                    </div>
                    <button type="submit" class="btn-principal">Registrarme</button>
                </form>
            </div>
        </div>
    </div>

    <!-- BARRA DE NAVEGACIÓN -->
    <nav id="navbar" style="display: none;">
        <div class="nav-contenedor">
            <div class="nav-logo">🏥 MediAgenda</div>
            <div id="navMenu" class="nav-menu"></div>
            <div class="nav-usuario">
                <span id="userName"></span>
                <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar Sesión</button>
            </div>
        </div>
    </nav>

    <!-- VISTAS -->
    <div id="vistaAgendar" class="vista contenedor-principal" style="display: none;">
        <h2>Agendar Nueva Cita</h2>
        <form onsubmit="agendarCita(event)">
            <div class="grupo-campo">
                <label for="citaEspecialidad">Especialidad *</label>
                <select id="citaEspecialidad" required onchange="cargarMedicosPorEspecialidad()">
                    <option value="">Seleccione especialidad</option>
                    <option value="Psicología">Psicología</option>
                    <option value="Odontología">Odontología</option>
                    <option value="Medicina General">Medicina General</option>
                    <option value="Pediatría">Pediatría</option>
                </select>
            </div>
            <div class="grupo-campo">
                <label for="citaMedico">Médico *</label>
                <select id="citaMedico" required>
                    <option value="">Seleccione un médico</option>
                </select>
            </div>
            <div class="grupo-campo">
                <label for="citaFecha">Fecha *</label>
                <input type="date" id="citaFecha" required>
            </div>
            <div class="grupo-campo">
                <label for="citaHora">Hora *</label>
                <input type="time" id="citaHora" required>
            </div>
            <div class="grupo-campo">
                <label for="citaMotivo">Motivo *</label>
                <textarea id="citaMotivo" rows="3" required></textarea>
            </div>
            <button type="submit" class="btn-principal">Agendar Cita</button>
        </form>
    </div>

    <div id="vistaMisCitas" class="vista contenedor-principal" style="display: none;">
        <h2>Mis Citas</h2>
        <div id="listaMisCitas"></div>
    </div>

    <div id="vistaPerfil" class="vista contenedor-principal" style="display: none;">
        <h2>Mi Perfil</h2>
        <form onsubmit="actualizarPerfil(event)">
            <div class="grupo-campo">
                <label>Nombres</label>
                <input type="text" id="perfilNombres" readonly>
            </div>
            <div class="grupo-campo">
                <label>Cédula</label>
                <input type="text" id="perfilCi" readonly>
            </div>
            <div class="grupo-campo">
                <label>Correo</label>
                <input type="email" id="perfilCorreo" required>
            </div>
            <div class="grupo-campo">
                <label>Celular</label>
                <input type="tel" id="perfilCelular" required>
            </div>
            <div class="grupo-campo">
                <label>Dirección</label>
                <input type="text" id="perfilDireccion" required>
            </div>
            <button type="submit" class="btn-principal">Guardar Cambios</button>
        </form>
    </div>

    <div id="vistaMedicoCalendario" class="vista contenedor-principal" style="display: none;">
        <h2>Mi Calendario</h2>
    </div>

    <div id="vistaMedicoCitas" class="vista contenedor-principal" style="display: none;">
        <h2>Gestión de Citas</h2>
        <div id="listaCitasMedico"></div>
    </div>

    <div id="vistaAdminUsuarios" class="vista contenedor-principal" style="display: none;">
        <h2>Gestión de Usuarios</h2>
        <button class="btn-principal" onclick="mostrarModalAgregarMedico()">Agregar Médico</button>
        <table id="tablaUsuarios" style="width:100%;margin-top:1rem;"></table>
    </div>

    <div id="vistaAdminEstadisticas" class="vista contenedor-principal" style="display: none;">
        <h2>Estadísticas</h2>
        <div id="estadisticasGrid"></div>
    </div>

    <!-- MODALES -->
    <div id="modalAgregarMedico" class="modal">
        <div class="modal-contenido">
            <span class="cerrar" onclick="cerrarModal('modalAgregarMedico')">&times;</span>
            <h3>Agregar Nuevo Médico</h3>
            <form onsubmit="agregarMedico(event)">
                <div class="grupo-campo">
                    <label>Cédula (MED001...) *</label>
                    <input type="text" id="medicoCi" required>
                </div>
                <div class="grupo-campo">
                    <label>Nombres *</label>
                    <input type="text" id="medicoNombres" required>
                </div>
                <div class="grupo-campo">
                    <label>Correo *</label>
                    <input type="email" id="medicoCorreo" required>
                </div>
                <div class="grupo-campo">
                    <label>Especialidad *</label>
                    <select id="medicoEspecialidad" required>
                        <option value="Psicología">Psicología</option>
                        <option value="Odontología">Odontología</option>
                        <option value="Medicina General">Medicina General</option>
                        <option value="Pediatría">Pediatría</option>
                    </select>
                </div>
                <div class="grupo-campo">
                    <label>Género *</label>
                    <select id="medicoGenero" required>
                        <option value="M">Masculino</option>
                        <option value="F">Femenino</option>
                    </select>
                </div>
                <div class="grupo-campo">
                    <label>Contraseña *</label>
                    <input type="password" id="medicoPassword" required>
                </div>
                <button type="submit" class="btn-principal">Registrar</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
